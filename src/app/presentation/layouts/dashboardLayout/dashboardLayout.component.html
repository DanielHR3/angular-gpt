<main class="flex flex-row h-screen bg-[#09090b] text-zinc-100 overflow-hidden">
  <!-- Sidebar -->
  <nav
    class="hidden lg:flex flex-col m-5 w-80 bg-zinc-900/40 border border-white/5 backdrop-blur-md p-6 rounded-[2rem]"
  >
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 bg-violet-600 rounded-xl flex items-center justify-center shadow-lg shadow-violet-900/40">
        <span class="text-white font-bold text-xl">A</span>
      </div>
      <div>
        <h1 class="font-bold text-2xl tracking-tight">
          Aura<span class="text-violet-400">AI</span>
        </h1>
        <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-medium">Intelligence System</p>
      </div>
    </div>

    <div class="space-y-1 overflow-y-auto pr-2 custom-scroll">
      @for (route of routes; track route.path) {
        <app-sidebar-menu-item
          [description]="route.data!['description']"
          [icon]="route.data!['icon']"
          [title]="route.data!['title']"
          [path]="route.path!"
        />
      }
    </div>

    <div class="mt-auto pt-6 border-t border-white/5">
      <div class="flex items-center gap-3 p-3 rounded-2xl bg-white/5">
        <div class="w-8 h-8 rounded-full bg-violet-500/20 flex items-center justify-center">
          <span class="text-violet-400 text-xs font-bold">DH</span>
        </div>
        <div class="overflow-hidden">
          <p class="text-xs font-semibold truncate text-zinc-200">Daniel Hernández</p>
          <p class="text-[10px] text-zinc-500 truncate">Software Engineer</p>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <section class="flex-1 flex flex-col m-5 ml-0 lg:ml-0 bg-zinc-900/20 border border-white/5 rounded-[2rem] overflow-hidden">
    <div class="flex-1 overflow-y-auto p-8 custom-scroll">
      <router-outlet />
    </div>
  </section>
</main>
