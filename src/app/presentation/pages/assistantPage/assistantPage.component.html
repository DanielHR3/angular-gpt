<div class="flex flex-col h-full fade-in">
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6 px-2">
    <div>
      <h2 class="text-2xl font-bold tracking-tight text-white">Asistente Inteligente</h2>
      <p class="text-xs text-zinc-500 mt-1 uppercase tracking-widest font-medium">Potenciado por Aura AI Engine</p>
    </div>
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-violet-500/10 border border-violet-500/20">
      <div class="w-1.5 h-1.5 rounded-full bg-violet-400 animate-pulse"></div>
      <span class="text-[10px] font-bold text-violet-400 uppercase tracking-wider">Online</span>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-messages custom-scroll">
      <div class="grid gap-y-4">
        <app-chat-message text="Hola, soy tu asistente de Aura Intelligence. ¿En qué puedo ayudarte hoy?" />

        @for (message of messages(); track $index) {
          @if( message.isGpt ) {
            <app-chat-message [text]="message.text" />
          } @else {
            <app-my-message [text]="message.text" />
          }
        }

        @if (isLoading()) {
          <app-typing-loader />
        }
      </div>
    </div>

    <!-- MessageBox -->
    <div class="mt-6">
      <app-text-message-box
        placeholder="Escribe tu pregunta o comando..."
        (onMessage)="handleMessage($event)"
      />
    </div>
  </div>
</div>
