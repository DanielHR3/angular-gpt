<div class="flex flex-col h-full fade-in">
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6 px-2">
    <div>
      <h2 class="text-2xl font-bold tracking-tight text-white">Corrector Ortográfico</h2>
      <p class="text-xs text-zinc-500 mt-1 uppercase tracking-widest font-medium">Análisis de texto avanzado</p>
    </div>
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-violet-500/10 border border-violet-500/20">
      <div class="w-1.5 h-1.5 rounded-full bg-violet-400 animate-pulse"></div>
      <span class="text-[10px] font-bold text-violet-400 uppercase tracking-wider">Sistema Activo</span>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-messages custom-scroll">
      <div class="grid gap-y-4">
        <app-chat-message text="Bienvenido a Aura AI. Escribe el texto que deseas que revise y corregiré cualquier error gramatical u ortográfico." />

        @for (message of messages(); track $index) {
          @if( message.isGpt ) {
            <app-gpt-message-orthography
              [text]="message.text"
              [errors]="message.info!.errors"
              [userScore]="message.info!.userScore"
            />
          } @else {
            <app-my-message [text]="message.text" />
          }
        }

        @if (isLoading()) {
          <app-typing-loader />
        }
      </div>
    </div>

    <!-- MessageBox -->
    <div class="mt-6">
      <app-text-message-box
        placeholder="Pega aquí tu texto para analizar..."
        (onMessage)="handleMessage($event)"
        [disableCorrections]="true"
      />
    </div>
  </div>
</div>
