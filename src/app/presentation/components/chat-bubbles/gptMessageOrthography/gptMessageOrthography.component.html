<div class="col-start-1 col-end-11 p-2 rounded-lg fade-in">
  <div class="flex flex-row items-start group">
    <div class="flex items-center justify-center h-9 w-9 rounded-xl bg-violet-600/20 border border-violet-500/20 text-violet-400 flex-shrink-0 shadow-lg shadow-violet-900/10 transition-transform duration-300 group-hover:scale-110">
      <i class="fa-solid fa-wand-magic-sparkles text-sm"></i>
    </div>

    <div class="relative ml-4 text-sm bg-white/[0.03] border border-white/5 backdrop-blur-sm pt-5 pb-4 px-6 shadow-2xl rounded-2xl rounded-tl-none text-zinc-200 w-full max-w-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500">Resultado del Análisis</h3>
        <div class="flex items-center gap-2 px-3 py-1 bg-violet-500/10 border border-violet-500/20 rounded-full">
          <span class="text-[10px] font-bold text-violet-400 uppercase">Puntaje:</span>
          <span class="text-sm font-bold text-white">{{userScore}}%</span>
        </div>
      </div>

      <p class="leading-relaxed mb-6 text-zinc-300 font-medium italic">"{{ text }}"</p>

      <div class="space-y-3">
        @if( errors.length > 0 ){
          <h4 class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Correcciones Sugeridas</h4>
          <ul class="space-y-2">
            @for (error of errors; track $index) {
              <li class="flex items-start gap-3 text-sm p-3 bg-white/5 border border-white/5 rounded-xl text-zinc-200">
                <i class="fa-solid fa-circle-info text-[10px] mt-1 text-violet-400"></i>
                {{ error }}
              </li>
            }
          </ul>
        } @else {
          <div class="flex items-center gap-3 p-4 bg-emerald-500/5 border border-emerald-500/20 rounded-xl text-emerald-400">
            <i class="fa-solid fa-circle-check text-sm"></i>
            <span class="text-sm font-medium">No se encontraron errores. ¡Excelente ortografía!</span>
          </div>
        }
      </div>
    </div>
  </div>
</div>
